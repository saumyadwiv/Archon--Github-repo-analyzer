name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://archon-github-repo-analyzer.onrender.com)
          echo "Backend response code: $response"
          if [ "$response" -ne 200 ]; then
            echo "Warning: backend did not return 200"
          fi

      - name: Ping frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://archon-github-repo-analyzer-1.onrender.com)
          echo "Frontend response code: $response"
          if [ "$response" -ne 200 ]; then
            echo "Warning: frontend did not return 200"
          fi
name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:         # lets you trigger it manually from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://archon-github-repo-analyzer.onrender.com/api/health)
          echo "Response code: $response"
          if [ "$response" -ne 200 ]; then
            echo "Warning: backend did not return 200"
          fi